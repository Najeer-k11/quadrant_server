version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: example/Dockerfile
    ports:
      - "5050:5050"
    environment:
      PORT: "5050"
      APP_ENV: "production"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
