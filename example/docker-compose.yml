version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    depends_on:
      - mongo
    environment:
      MONGO_URI: "mongodb://mongo:27017/dart_backend"
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dart_backend
    restart: unless-stopped

volumes:
  mongo-data:
